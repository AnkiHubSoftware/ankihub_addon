<!DOCTYPE html>
<html class="{{ theme }}">
<head>
    <meta charset="UTF-8">
    <title>Empty State</title>

    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
            font-family: "Merriweather Sans", sans-serif;
        }

        html, body {
            height: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f9fafb;
        }

        .empty-state {
            padding: 2rem;
            width: 100%;
            max-width: 900px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;

            min-height: 100vh;

            background-color: #f9fafb;
        }

        /* 🌙 DARK MODE (inner panel) */
        .dark .empty-state {
            background-color: #030712;
        }

        .empty-state__icon {
            width: 2.5rem;
            height: 2.5rem;
            color: #f59e0b;
            margin-bottom: 0.75rem;
        }

        .empty-state__title {
            font-weight: 300;
            font-size: 1.75rem;
            line-height: 1.4;
            color: #b45309;
        }

        .empty-state__divider {
            width: 100%;
            border: none;
            border-top: 1px solid #d4d4d4;
            margin: 1.5rem 0;
        }

        .empty-state__text {
            font-weight: 300;
            font-size: 1.05rem;
            line-height: 1.6;
            color: #4b5563;
            max-width: 500px;
        }

        .empty-state__highlight {
            font-weight: 700;
        }

        .empty-state__link {
            text-decoration: underline;
            color: #4f46e5;
            font-weight: 700;
        }

        .empty-state__link:hover {
            color: #4338ca;
        }

        /* 🌙 DARK MODE */
        .dark .empty-state__title {
            color: #fcd34d;
        }

        .dark .empty-state__divider {
            border-top: 1px solid #374151;
        }

        .dark .empty-state__text {
            color: #9ca3af;
        }

        .dark .empty-state__link {
            color: #818cf8;
        }

        .dark .empty-state__link:hover {
            color: #a5b4fc;
        }
    </style>
</head>

<body>
    <div class="empty-state">

        <svg xmlns="http://www.w3.org/2000/svg"
             class="empty-state__icon"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor">
            <path stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>

        <h1 class="empty-state__title">
            No relevant content linked
        </h1>

        <hr class="empty-state__divider">

        <p class="empty-state__text">
            We couldn't find any <span class="empty-state__highlight">content</span> connected to this card.<br><br>
            If that seems wrong, let our
            <a href="https://community.ankihub.net/c/support/5" class="empty-state__link" rel="external">support team</a> know.
        </p>
    </div>
</body>
</html>
